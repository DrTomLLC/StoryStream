[package]
name = "storystream-library"
version = "0.1.0"
edition = "2021"

[dependencies]
storystream-core = { path = "../core" }
storystream-database = { path = "../database" }
media-engine = { path = "../media-engine" }

# Metadata extraction
lofty = "0.21"
image = "0.25"

# Async and utilities
tokio = { version = "1.40", features = ["full"] }
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"

# File operations
walkdir = "2.5"
notify = "6.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
tempfile = "3.12"